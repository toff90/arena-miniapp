<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 Arena Click</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .coins-display {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.4rem;
        }
        .coins-label {
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }
        .tap-btn {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #FF6B35, #FF0080, #7B2FFF);
            box-shadow: 0 0 70px rgba(255, 107, 53, 0.45);
            cursor: pointer;
            font-size: 5rem;
            transition: transform 0.08s, box-shadow 0.08s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .tap-btn:active {
            transform: scale(0.91);
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.25);
        }
        .tap-hint {
            margin-top: 1.5rem;
            color: #444;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }
        .float-coin {
            position: fixed;
            font-weight: 900;
            font-size: 1.4rem;
            color: #FFD700;
            pointer-events: none;
            animation: floatUp 0.75s ease-out forwards;
            z-index: 999;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
        }
        .stats-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            padding: 1rem 0 1.2rem;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .stat-item { text-align: center; }
        .stat-value { font-weight: 800; font-size: 1.1rem; }
        .stat-label { color: #555; font-size: 0.65rem; letter-spacing: 1px; margin-top: 2px; }
    </style>
</head>
<body>

<div class="coins-display" id="coinsDisplay">0</div>
<div class="coins-label">⚡ ARENA COINS</div>

<button class="tap-btn" id="tapBtn" onclick="handleTap(event)">🔥</button>
<div class="tap-hint">TAP TO EARN</div>

<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value" id="powerDisplay">x1</div>
        <div class="stat-label">POWER</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="tapsDisplay">0</div>
        <div class="stat-label">TAPS</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="rankDisplay">#?</div>
        <div class="stat-label">RANK</div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://vwgxfxthammtghqjhhzs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3Z3hmeHRoYW1tdGdocWpoaHpzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTcwNDY5MSwiZXhwIjoyMDkxMjgwNjkxfQ.czGJVjrdhQc6cY0IrAL8Ah9RnKZZjW7-UzS4r4gX5nU';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = { coins: 0, tapPower: 1, taps: 0, pendingSync: 0, userId: null };
let syncTimer = null;

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const urlParams = new URLSearchParams(window.location.search);
state.userId = urlParams.get('uid') || tg.initDataUnsafe?.user?.id;

async function loadUser() {
    if (!state.userId) return;
    const { data } = await db.from('users')
        .select('coins, tap_power')
        .eq('id', state.userId)
        .single();
    if (data) {
        state.coins = data.coins || 0;
        state.tapPower = data.tap_power || 1;
        updateUI();
        loadRank();
    }
}

async function loadRank() {
    const { data } = await db.from('users')
        .select('id')
        .order('coins', { ascending: false });
    if (data) {
        const rank = data.findIndex(u => String(u.id) === String(state.userId)) + 1;
        document.getElementById('rankDisplay').textContent = rank > 0 ? `#${rank}` : '#?';
    }
}

function handleTap(event) {
    state.coins += state.tapPower;
    state.taps += 1;
    state.pendingSync += state.tapPower;
    updateUI();
    spawnFloatingCoin(event);
    clearTimeout(syncTimer);
    syncTimer = setTimeout(syncToDb, 2000);
}

async function syncToDb() {
    if (!state.userId || state.pendingSync === 0) return;
    const toSync = state.pendingSync;
    state.pendingSync = 0;
    await db.rpc('add_coins', {
        user_id: parseInt(state.userId),
        amount: toSync
    });
}

function updateUI() {
    document.getElementById('coinsDisplay').textContent = state.coins.toLocaleString('en-US');
    document.getElementById('powerDisplay').textContent = `x${state.tapPower}`;
    document.getElementById('tapsDisplay').textContent = state.taps.toLocaleString('en-US');
}

function spawnFloatingCoin(event) {
    const el = document.createElement('div');
    el.className = 'float-coin';
    el.textContent = `+${state.tapPower}`;
    const x = event.clientX || window.innerWidth / 2;
    const y = event.clientY || window.innerHeight / 2;
    el.style.left = `${x - 20 + (Math.random() - 0.5) * 40}px`;
    el.style.top = `${y - 20}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
}

window.addEventListener('beforeunload', () => syncToDb());
loadUser();
</script>
</body>
</html>
