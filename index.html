<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Arena Coins ⚔️</title>

<script>
  // ── Inizializzazione Stato Wallet ──────────────────────────────────────────
  let _wRes;
  window._walletReady = new Promise(res => { _wRes = res; });
  window._walletReadyResolve = _wRes;
  window._walletAddress = sessionStorage.getItem('arena_wallet') || null;
  window._TREASURY = '0x775232aCa7c3bfC4455417f102Ab17420F553982';

  window._setWallet = function(addr) {
    window._walletAddress = addr;
    if (addr) sessionStorage.setItem('arena_wallet', addr);
    else      sessionStorage.removeItem('arena_wallet');
  };
</script>

<script>
// ── Arena Coins — Wallet Module v2.0 (Mobile Optimized) ──────────────────────
(function loadAppKit() {
  const VERSIONS = ['1.1.3', '1.1.2', '1.1.1', '1.0.9'];
  let tried = 0;

  function tryLoad(version) {
    const s = document.createElement('script');
    s.src = `https://cdn.jsdelivr.net/npm/@reown/appkit-cdn@${version}/dist/appkit.js`;
    s.crossOrigin = "anonymous";
    s.onload = () => initAppKit(version);
    s.onerror = () => {
      tried++;
      if (tried < VERSIONS.length) tryLoad(VERSIONS[tried]);
      else window._walletReadyResolve(); 
    };
    document.head.appendChild(s);
  }

  async function initAppKit(v) {
    try {
      const { createAppKit, networks } = window.AppKitLib || window.AppKit;
      
      const modal = createAppKit({
        adapters: [], 
        networks: [networks.avalanche],
        projectId: 'YOUR_REOWN_PROJECT_ID', // Sostituisci con il tuo Project ID di cloud.reown.com
        metadata: {
          name: 'Arena Coins',
          description: 'Join the Arena',
          url: window.location.origin,
          icons: ['https://avatars.githubusercontent.com/u/179229932']
        },
        themeMode: 'dark'
      });

      window._modal = modal;

      modal.subscribeAccount(acc => {
        if (acc.address) {
          window._setWallet(acc.address);
          if (window._onWalletConnected) window._onWalletConnected(acc.address);
        } else {
          window._setWallet(null);
        }
      });

      window.connectWallet = async () => {
        try {
          await modal.open();
        } catch (e) {
          console.error("Connection failed", e);
        }
      };

      window._walletReadyResolve();
    } catch (e) {
      window._walletReadyResolve();
    }
  }

  tryLoad(VERSIONS[0]);
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --gold-bright: #FFD700;
  --crimson: #8B0000;
  --bg: #0a0a0c;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: white;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
}

#canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }

/* ── UI Screens ─────────────────────────────────────────────── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(circle at center, #1a1a20 0%, #050505 100%);
  z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.4s;
}
.screen.show { opacity: 1; pointer-events: auto; }

h1 {
  font-family: 'Cinzel Decorative', cursive;
  color: var(--gold);
  font-size: 2.8rem;
  text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
  margin-bottom: 20px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--gold-bright), var(--gold));
  color: black;
  border: none;
  padding: 15px 40px;
  font-size: 1.2rem;
  font-weight: 700;
  border-radius: 8px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* ── Game UI ────────────────────────────────────────────────── */
#gameUI {
  position: relative; z-index: 10;
  flex: 1; display: flex; flex-direction: column;
  padding: 20px;
}

.stat-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,175,55,0.3);
  padding: 10px 20px;
  border-radius: 12px;
  backdrop-filter: blur(5px);
  text-align: center;
}

#coinDisplay {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--gold-bright);
}

.arena-circle {
  width: 280px; height: 280px;
  margin: auto;
  border-radius: 50%;
  background: url('https://img.freepik.com/premium-photo/gold-coin-with-sword-it_1103290-26036.jpg') center/cover;
  border: 8px solid var(--gold-dark);
  box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
  position: relative;
  transition: transform 0.05s;
}
.arena-circle:active { transform: scale(0.96); }

.tap-float {
  position: fixed; color: var(--gold-bright); font-weight: 800;
  pointer-events: none; animation: floatUp 0.8s ease-out forwards;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100px); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="connectScreen" class="screen show">
  <h1>ARENA COINS</h1>
  <p style="margin-bottom: 30px; color: #888;">Enter the Arena. Earn AVAX.</p>
  <button class="btn-primary" onclick="connectWallet()">Connect Wallet</button>
  <p id="connectMsg" style="margin-top: 15px; font-size: 0.9rem; color: var(--gold);"></p>
</div>

<div id="gameUI" style="display:none;">
  <div class="stat-card">
    <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Balance</div>
    <div id="coinDisplay">0</div>
  </div>

  <div class="arena-circle" id="tapArea"></div>

  <div class="stat-card" style="margin-top: 20px;">
    <div id="energyBar" style="height: 4px; background: var(--gold); width: 100%; margin-bottom: 5px;"></div>
    <div id="energyText">Energy: 100 / 100</div>
  </div>
</div>

<script>
// ── Game Logic ───────────────────────────────────────────────
let coins = 0;
let energy = 100;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function spawnParticles(x, y) {
  for(let i=0; i<8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.5) * 10,
      alpha: 1,
      size: 2 + Math.random() * 3,
      color: '#FFD700'
    });
  }
}

function updateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.1);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.alpha *= 0.95;
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  requestAnimationFrame(updateParticles);
}
updateParticles();

function handleTap(e) {
  if (energy <= 0) return;
  
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;

  coins++;
  energy--;
  
  document.getElementById('coinDisplay').textContent = coins.toLocaleString();
  document.getElementById('energyText').textContent = `Energy: ${energy} / 100`;
  document.getElementById('energyBar').style.width = `${energy}%`;

  spawnParticles(x, y);
  
  const float = document.createElement('div');
  float.className = 'tap-float';
  float.textContent = '+1';
  float.style.left = `${x}px`;
  float.style.top = `${y}px`;
  document.body.appendChild(float);
  setTimeout(() => float.remove(), 800);
}

document.getElementById('tapArea').addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleTap(e);
});

// ── App Initialization ──────────────────────────────────────
window._onWalletConnected = (address) => {
  document.getElementById('connectScreen').classList.remove('show');
  document.getElementById('gameUI').style.display = 'flex';
  console.log("Gladiator Joined:", address);
};

// Auto-reconnect if session exists
window._walletReady.then(() => {
  if (window._walletAddress) {
    window._onWalletConnected(window._walletAddress);
  }
});
</script>

</body>
</html>
