services:
  # Arena MiniApp API — pure HTTP, no Telegram
  - type: web
    name: arena-api
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    # gunicorn: 2 workers, 120s timeout (Render free tier)
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TREASURY_ADDR
        sync: false
      - key: ADMIN_KEY
        sync: false
      # Comma-separated allowed CORS origins
      - key: FRONTEND_ORIGINS
        value: "https://arena.social,https://toff90.github.io,https://arena-frontend.onrender.com"
