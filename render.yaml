services:
  # 1. Bot Telegram (Web Service Python)
  - type: web
    name: arena-bot
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MINIAPP_URL
        sync: false
      - key: TREASURY_ADDR
        sync: false
      - key: ADMIN_IDS
        sync: false

  # 2. Frontend (Static Site)
  - type: web
    name: arena-frontend
    runtime: static
    branch: main
    buildCommand: ""   # Lascia vuoto se non hai build steps
    staticPublishPath: .      # Pubblica la root del repository
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TREASURY_ADDR
        sync: false
