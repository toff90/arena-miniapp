services:
  # 1. Bot Telegram (Web Service Python)
  - type: web
    name: arena-bot
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MINIAPP_URL
        sync: false
      - key: TREASURY_ADDR
        sync: false
      - key: ADMIN_IDS
        sync: false

  # 2. Frontend (Static Site)
  - type: static-site
    name: arena-frontend
    branch: main
    buildCommand: ""   # se non hai build steps
    publishDir: .      # se index.html è nella root del repo
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TREASURY_ADDR
        sync: false
